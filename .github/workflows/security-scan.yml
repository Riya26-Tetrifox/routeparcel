name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11


      # 5️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t myimg:latest .

      
      
          # 6️⃣ 📦 Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: myimg:latest
          format: cyclonedx
          output: sbom.json

      - name: Create Report Directory
        run: mkdir -p security-bot/report

      - name: Scan SBOM and Generate JSON Report
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: sbom
          scan-ref: sbom.json
          format: json
          output: security-bot/report/trivy_report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Delete SBOM file
        run: rm -f sbom.json

      - name: Install security-bot dependencies
        run: pip install -r security-bot/requirements.txt


      - name: Run Auto Remediation
        id: auto_fix
        run: |
          OUTPUT=$(python3 security-bot/main.py)
          echo "$OUTPUT"
          if [[ "$OUTPUT" == *"VULNERABILITIES_FOUND"* ]]; then
            echo "fix_needed=true" >> $GITHUB_OUTPUT
          else
            echo "fix_needed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

         
      - name: Rebuild Docker Image After Fix
        if: steps.auto_fix.outputs.fix_needed == 'true'
        run: docker build -t myimg:fixed .

      - name: Re-Scan Image After Fix
        if: steps.auto_fix.outputs.fix_needed == 'true'
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: myimg:fixed
          severity: CRITICAL,HIGH
          exit-code: 1


      # 1️⃣ Create Pull Request for Fix
      - name: Create Pull Request
        if: steps.auto_fix.outputs.fix_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🔐 Auto-fix HIGH/CRITICAL vulnerabilities"
          branch: security/auto-fix
          title: "Security Auto Remediation"
          body: |
            This PR automatically fixes HIGH/CRITICAL vulnerabilities detected by Trivy.





