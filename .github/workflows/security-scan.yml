name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 4️⃣ Install Dependencies (for tests)
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 5️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t myimg:latest .

        # 4️⃣ 🔍 Filesystem Scan (Language Independent)
      - name: Scan Source Code (Trivy FS)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      
      # 5️⃣ 🐳 Docker Image Scan
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: myimg:latest
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: false
          # 6️⃣ 📦 Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.json


      - name: Scan SBOM
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: sbom
          scan-ref: sbom.json
          severity: CRITICAL,HIGH
          exit-code: 0


      # 8️⃣ 🧠 Code-Level Security Scan (CodeQL)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, java, cpp, javascript

      - name: Autobuild CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3


      - name: Run Auto Remediation
        id: auto_fix
        run: |
          OUTPUT=$(python3 security-bot/main.py)
          echo "$OUTPUT"
          if [[ "$OUTPUT" == *"VULNERABILITIES_FOUND"* ]]; then
            echo "fix_needed=true" >> $GITHUB_OUTPUT
          else
            echo "fix_needed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         
      - name: Rebuild Docker Image After Fix
        if: steps.auto_fix.outputs.fix_needed == 'true'
        run: docker build -t myimg:fixed .

      - name: Re-Scan Image After Fix
        if: steps.auto_fix.outputs.fix_needed == 'true'
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: myimg:fixed
          severity: CRITICAL,HIGH
          exit-code: 1


      # 1️⃣ Create Pull Request for Fix
      - name: Create Pull Request
        if: steps.auto_fix.outputs.fix_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🔐 Auto-fix HIGH/CRITICAL vulnerabilities"
          branch: security/auto-fix
          title: "Security Auto Remediation"
          body: |
            This PR automatically fixes HIGH/CRITICAL vulnerabilities detected by Trivy.





