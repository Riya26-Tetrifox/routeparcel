name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11


      # 5️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t myimg:latest .

      
      
          # 6️⃣ 📦 Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: myimg:latest
          format: cyclonedx
          output: sbom.json

      - name: Create Report Directory
        run: mkdir -p security-bot/report

      - name: Scan SBOM and Generate JSON Report
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: sbom
          scan-ref: sbom.json
          format: json
          output: security-bot/report/trivy_report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Delete SBOM file
        run: rm -f sbom.json

      - name: Run Security Bot Action
        id: auto_fix
        uses: Riya26-Tetrifox/security-bot-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Generate DORA Metrics
        run: |
          echo "# DORA Metrics Dashboard" > DORA.md
          echo '{"deployment_frequency": "weekly"}' > dora-metrics.json
          echo '[]' > dora-history.json

      - name: Debug Output
        run: |
          echo "Fix needed output is: ${{ steps.auto_fix.outputs.fix_needed }}"

         
      - name: Rebuild Docker Image After Fix
        run: docker build -t myimg:fixed .
          
      - name: Create PR for DORA Metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add DORA.md dora-metrics.json dora-history.json

          git diff --staged --quiet && echo "No changes" && exit 0

          branch="chore/dora-metrics-$(date +%Y%m%d)"
          git checkout -b "$branch"

          git commit -m "docs: update DORA metrics dashboard"
          git push -u origin "$branch"

          gh pr create \
            --title "Update DORA metrics dashboard" \
            --body "Automated weekly DORA metrics update." \
           

          gh pr merge "$branch" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
